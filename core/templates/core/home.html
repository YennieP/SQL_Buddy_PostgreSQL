<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Buddy - Learn SQL Interactively</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #6c757d;
            margin-bottom: 40px;
        }
        .btn-role {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            margin: 10px;
            transition: all 0.3s;
            border: none;
        }
        .btn-student {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-student:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .btn-mentor {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-mentor:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(240, 147, 251, 0.4);
            color: white;
        }
        .features {
            margin-top: 40px;
            display: flex;
            gap: 30px;
            justify-content: center;
        }
        .feature {
            text-align: center;
        }
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .feature-text {
            font-size: 0.9rem;
            color: #6c757d;
        }
        .btn-sm {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="hero-card">
        <div class="logo">🗄️</div>
        <h1>SQL Buddy</h1>
        <p class="subtitle">Master SQL through interactive practice and AI-powered assistance</p>
        
        <div class="d-flex flex-column align-items-center">
            <a href="{% url 'login' %}" class="btn btn-student btn-role">
                🔐 Login to SQL Buddy
            </a>
            <div class="mt-3">
                <small class="text-muted">Quick Demo Access:</small>
            </div>
            <div class="d-flex gap-2 mt-2">
                <a href="{% url 'student_dashboard' %}" class="btn btn-sm btn-outline-light" style="border-radius: 20px; padding: 8px 20px;">
                    👨‍🎓 Student Demo
                </a>
                <a href="{% url 'mentor_dashboard' %}" class="btn btn-sm btn-outline-light" style="border-radius: 20px; padding: 8px 20px;">
                    👨‍🏫 Mentor Demo
                </a>
            </div>
        </div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">💻</div>
                <div class="feature-text">Interactive<br>Problems</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🤖</div>
                <div class="feature-text">AI<br>Assistant</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">Progress<br>Tracking</div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
