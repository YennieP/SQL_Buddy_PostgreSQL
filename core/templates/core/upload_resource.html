{% extends 'core/base.html' %}

{% block title %}Upload Resource{% endblock %}

{% block content %}
<h2>Upload Resource</h2>

<div class="mb-3">
    <a href="{% url 'my_resources' %}" class="btn btn-secondary">Back to My Resources</a>
</div>

<form method="post" class="mt-4">
    {% csrf_token %}

    <div class="mb-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" class="form-control" id="title" name="title" required>
    </div>

    <div class="mb-3">
        <label for="res_type" class="form-label">Type</label>
        <select class="form-select" id="res_type" name="res_type" required>
            <option value="Article">Article</option>
            <option value="Video">Video</option>
            <option value="Tutorial">Tutorial</option>
            <option value="Documentation">Documentation</option>
            <option value="Other">Other</option>
        </select>
    </div>

    <div class="mb-3">
        <label for="resource_url" class="form-label">Resource URL</label>
        <input type="url" class="form-control" id="resource_url" name="resource_url" required
               placeholder="https://example.com/resource">
    </div>

    <div class="mb-3">
        <label class="form-label">Topics (Optional)</label>
        {% if topics %}
        <div>
            {% for topic in topics %}
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="topics"
                       id="topic{{ forloop.counter }}" value="{{ topic.topic_name }}">
                <label class="form-check-label" for="topic{{ forloop.counter }}">
                    {{ topic.topic_name }}
                </label>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-muted">No topics available</p>
        {% endif %}
    </div>

    <button type="submit" class="btn btn-primary">Upload Resource</button>
    <a href="{% url 'my_resources' %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
